<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="css/auth.css">
</head>

<body>

<div class="bg-container d-flex justify-content-center align-items-center">

  <div class="auth-card-signup">

    <h4 class="text-center fw-bold">Create Account</h4>
    <p class="text-center text-muted small">Join NatureKart today</p>

    <!-- FORM -->
    <form>

      <!-- Name -->
      <div class="input-group-custom">
        <i class="fa-solid fa-user icon"></i>
        <input type="text" id="name" placeholder="Full Name">
      </div>

      <!-- Email -->
      <div class="input-group-custom">
        <i class="fa-solid fa-envelope icon"></i>
        <input type="email" id="email" placeholder="Email">
      </div>

      <!-- Phone -->
      <div class="input-group-custom">
        <i class="fa-solid fa-phone icon"></i>
        <input type="text" id="phone" placeholder="Phone Number">
      </div>

      <!-- Password -->
      <div class="input-group-custom">
        <i class="fa-solid fa-lock icon"></i>
        <input type="password" id="password" placeholder="Password">
        <i class="fa-solid fa-eye toggle" id="togglePassword" onclick="togglePassword('password','togglePassword')"></i>
      </div>

      <!-- Confirm Password -->
      <div class="input-group-custom">
        <i class="fa-solid fa-lock icon"></i>
        <input type="password" id="confirmPassword" placeholder="Confirm Password">
        <i class="fa-solid fa-eye toggle" id="toggleConfirmPassword" onclick="togglePassword('confirmPassword','toggleConfirmPassword')"></i>
      </div>

      <!-- Role -->
      <div class="mb-3">
        <select id="role" class="form-select rounded-pill">
          <option value="">Select Role</option>
          <option value="farmer">Farmer</option>
          <option value="consumer">Consumer</option>
          <option value="admin">Admin</option>
        </select>
      </div>

      <!-- Button -->
      <button type="button" class="btn-auth" onclick="signupUser()">Sign Up</button>

      <p class="divider">Or sign up with</p>

      <!-- Google -->
      <button class="google-btn">
        <img src="https://img.icons8.com/color/16/google-logo.png"/>
        Sign up with Google
      </button>

      <p class="text-center mt-3 small">
        Already have an account? <a href="login.html" class="link">Login</a>
      </p>

    </form>

  </div>

</div>

<!-- JS -->
<script>

  function togglePassword(fieldId, toggleId) {
    const field = document.getElementById(fieldId);
    const toggle = document.getElementById(toggleId);

    if (field.type === "password") {
      field.type = "text";
      toggle.classList.remove("fa-eye");
      toggle.classList.add("fa-eye-slash");
    } else {
      field.type = "password";
      toggle.classList.remove("fa-eye-slash");
      toggle.classList.add("fa-eye");
    }
  }

  function signupUser() {
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const password = document.getElementById("password").value.trim();
    const confirmPassword = document.getElementById("confirmPassword").value.trim();
    const role = document.getElementById("role").value;

    const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

    if (!name || !email || !phone || !password || !confirmPassword || !role) {
      alert("All fields are required!");
      return;
    }

    if (!emailPattern.test(email)) {
      alert("Enter valid email!");
      return;
    }

    if (password.length < 6) {
      alert("Password must be at least 6 characters!");
      return;
    }

    if (password !== confirmPassword) {
      alert("Passwords do not match!");
      return;
    }

    alert("Signup successful!");
    window.location.href = "login.html";
  }

</script>

</body>
</html>
