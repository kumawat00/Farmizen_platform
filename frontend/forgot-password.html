<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- CSS -->
  <link rel="stylesheet" href="css/auth.css">
</head>

<body>

<div class="bg-container d-flex justify-content-center align-items-center">

  <div class="auth-card">

    <h4 class="auth-title">Forgot Password</h4>
    <p class="auth-subtitle">Enter your email or phone to reset password</p>

    <form>

      <!-- Email / Phone -->
      <div class="input-group-custom">
        <i class="fa-solid fa-envelope icon"></i>
        <input type="text" id="identifier" placeholder="Email or Phone Number">
      </div>

      <!-- New Password -->
      <div class="input-group-custom">
        <i class="fa-solid fa-lock icon"></i>
        <input type="password" id="newPassword" placeholder="New Password">
        <i class="fa-solid fa-eye toggle" id="toggleNewPassword" onclick="togglePassword('newPassword','toggleNewPassword')"></i>
      </div>

      <!-- Confirm Password -->
      <div class="input-group-custom">
        <i class="fa-solid fa-lock icon"></i>
        <input type="password" id="confirmPassword" placeholder="Confirm Password">
        <i class="fa-solid fa-eye toggle" id="toggleConfirmPassword" onclick="togglePassword('confirmPassword','toggleConfirmPassword')"></i>
      </div>

      <!-- Button -->
      <button type="button" class="btn-auth" onclick="resetPassword()">Reset Password</button>

      <!-- Back to login -->
      <p class="text-center mt-3 small">
        Remember your password? <a href="login.html" class="link">Login</a>
      </p>

    </form>

  </div>

</div>

<!-- JS -->
<script>

  function togglePassword(fieldId, toggleId) {
    const field = document.getElementById(fieldId);
    const toggle = document.getElementById(toggleId);

    if (field.type === "password") {
      field.type = "text";
      toggle.classList.remove("fa-eye");
      toggle.classList.add("fa-eye-slash");
    } else {
      field.type = "password";
      toggle.classList.remove("fa-eye-slash");
      toggle.classList.add("fa-eye");
    }
  }

  function resetPassword() {
    const identifier = document.getElementById("identifier").value.trim();
    const newPassword = document.getElementById("newPassword").value.trim();
    const confirmPassword = document.getElementById("confirmPassword").value.trim();

    if (!identifier || !newPassword || !confirmPassword) {
      alert("All fields are required!");
      return;
    }

    if (newPassword.length < 6) {
      alert("Password must be at least 6 characters!");
      return;
    }

    if (newPassword !== confirmPassword) {
      alert("Passwords do not match!");
      return;
    }

    alert("Password reset successful!");
    window.location.href = "login.html";
  }

</script>

</body>
</html>
