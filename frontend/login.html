<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!--  CSS -->
  <link rel="stylesheet" href="css/auth.css">
</head>

<body>

<div class="bg-container">

  <div class="auth-card">

    <h3 class="text-center mb-3">Welcome Back</h3>
    <p class="text-center text-muted mb-4">Login to your account</p>

    <!-- EMAIL -->
    <div class="input-group-custom">
      <i class="fa-solid fa-envelope icon"></i>
      <input type="email" id="email" placeholder="Username or Email" required>
    </div>

    <!-- PASSWORD -->
    <div class="input-group-custom">
      <i class="fa-solid fa-lock icon"></i>
      <input type="password" id="password" placeholder="Password" required>
      <i class="fa-solid fa-eye toggle" onclick="togglePassword('password', this)"></i>
    </div>

    <!-- FORGOT -->
    <div class="text-end mb-2">
      <a href="forgot-password.html" class="forgot">Forgot Password?</a>
    </div>

    <!-- LOGIN BUTTON -->
    <button class="btn-auth" onclick="loginUser()">Login</button>

    <!-- DIVIDER -->
    <div class="divider">or continue with</div>

    <!-- GOOGLE -->
    <button class="google-btn">
      <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" width="18">
      Sign in with Google
    </button>

    <!-- SIGNUP -->
    <p class="text-center mt-3 small">
      Don’t have an account? 
      <a href="signup.html" class="link">Sign up</a>
    </p>

  </div>

</div>

<!-- JS -->
<script>

  // SHOW / HIDE PASSWORD
  function togglePassword(fieldId, icon) {
    const field = document.getElementById(fieldId);

    if (field.type === "password") {
      field.type = "text";
      icon.classList.remove("fa-eye");
      icon.classList.add("fa-eye-slash");
    } else {
      field.type = "password";
      icon.classList.remove("fa-eye-slash");
      icon.classList.add("fa-eye");
    }
  }

  // LOGIN VALIDATION (REALISTIC BASIC VALIDATION)
  function loginUser() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    // Empty check
    if (!email || !password) {
      alert("Please fill all fields!");
      return;
    }

    // Email format check
    const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
    if (!email.match(emailPattern)) {
      alert("Enter a valid email!");
      return;
    }

    // Password length check
    if (password.length < 6) {
      alert("Password must be at least 6 characters!");
      return;
    }

    // SUCCESS (redirect to dashboard)
    alert("Login Successful!");
    window.location.href = "dashboard.html";
  }

</script>

</body>
</html>
